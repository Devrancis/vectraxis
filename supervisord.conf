[supervisord]
nodaemon=true
user=root 
logfile=/dev/stdout
logfile_maxbytes=0

[program:backend]
directory=/app
command=python -m uvicorn backend.main:app --host 127.0.0.1 --port 8000
autostart=true
autorestart=true
environment=PYTHONPATH="/app"
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:frontend]
directory=/app/frontend
command=node server.js
autostart=true
autorestart=true
# Hugging face looks for port 7860
environment=PORT=7860,HOSTNAME="0.0.0.0"
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0